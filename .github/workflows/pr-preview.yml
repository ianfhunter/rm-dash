# .github/workflows/preview.yml
name: Deploy PR previews

on:
    pull_request_target:
        types:
            - opened
            - reopened
            - synchronize
            - closed

concurrency: preview-${{ github.ref }}

permissions:
    contents: write
    issues: write
    pull-requests: write

jobs:
    deploy-preview:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Deploy preview
              uses: rossjrw/pr-preview-action@v1
              with:
                  source-dir: ./
                  preview-branch: main
                  qr-code: true
