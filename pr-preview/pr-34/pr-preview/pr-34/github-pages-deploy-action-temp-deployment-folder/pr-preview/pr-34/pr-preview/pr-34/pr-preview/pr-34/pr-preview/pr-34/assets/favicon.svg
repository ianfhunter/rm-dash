<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-labelledby="title desc">
  <title id="title">Raven's Mark Tools Favicon</title>
  <desc id="desc">A dark circular crest with a golden letter R.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#1b1f2a"/>
      <stop offset="100%" stop-color="#10131a"/>
    </linearGradient>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#c7a64b" stroke-width="3"/>
  <text x="32" y="42" text-anchor="middle" font-family="Cinzel, 'Times New Roman', serif" font-size="34" fill="#e3c773" font-weight="700">R</text>
</svg>
